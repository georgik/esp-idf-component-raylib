## IDF Component Manager Manifest File
description: Raylib (ESP-IDF wrapper on upstream Raylib)
license: Zlib
url: https://www.raylib.com/
repository: https://github.com/georgik/esp-idf-component-raylib
version: 6.0.0~0

files:
  exclude:
    - "raylib/CMakeLists.txt"  # Exclude raylib's own CMakeLists.txt to prevent it being treated as component
    - "raylib/.git*"           # Exclude git metadata

dependencies:
  ## Required IDF version
  idf:
    version: ">=5.5.0"

examples:
  - path: ./examples/esp32s3/espressif-esp32-s3-box-3_hello
  - path: ./examples/esp32s3/espressif-esp32-s3-box_hello
  - path: ./examples/esp32s3/espressif-esp32-s3-eye_hello
  - path: ./examples/esp32s3/espressif-esp32-s3-korvo-2_hello
  - path: ./examples/esp32s3/espressif-esp32-s3-lcd-ev-board_hello
  - path: ./examples/esp32s3/espressif-esp-vocat_hello
  - path: ./examples/esp32s3/m5stack-atom-s3_hello
  - path: ./examples/esp32s3/m5stack-atom-s3r_hello
  - path: ./examples/esp32s3/m5stack-core-s3_hello
  - path: ./examples/esp32/m5stack-core-2_hello
