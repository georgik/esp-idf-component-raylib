## IDF Component Manager Manifest File
dependencies:
  idf:
    version: ">=5.5.0"
  # Local raylib component - relative path from examples/esp_board_hello/main/
  # Structure: raylib/examples/esp_board_hello/main/ -> raylib/ (up 3 levels)
  georgik/raylib:
    version: "*"
    override_path: "../../.."
  #IF option("esp32_s3_box_3")
  espressif/esp-box-3_noglib:
    version: "*"
  #ENDIF
  #IF option("esp32_s3_lcd_ev_board")
  espressif/esp32_s3_lcd_ev_board:
    version: "*"
  #ENDIF
  #IF option("esp32s3_korvo_2")
  espressif/esp32_s3_korvo_2:
    version: "*"
  #ENDIF
  #IF option("esp32_s3_box")
  # ESP32-S3-BOX uses deprecated BSP, ST7789 driver built into ESP-IDF 6
  #ENDIF
  # New boards from esp-bsp (ESP32-S3 only)
  #IF option("esp_vocat")
  espressif/esp_vocat:
    version: "*"
  #ENDIF
  #IF option("esp32_s3_eye")
  espressif/esp32_s3_eye:
    version: "*"
  #ENDIF
  #IF option("m5stack_core_s3")
  espressif/m5stack_core_s3:
    version: "*"
  #ENDIF
  #IF option("m5stack_atom_s3")
  espressif/m5_atom_s3_noglib:
    version: "*"
  #ENDIF
  #IF option("m5stack_atom_s3r")
  # AtomS3R has no BSP - uses direct esp_lcd with GC9107 driver (built into ESP-IDF 6)
  #ENDIF
  #IF option("m5stack_core_2")
  espressif/m5stack_core_2:
    version: "*"
  #ENDIF
  # P4 boards skipped - esp-generate doesn't support esp32p4 chip yet
